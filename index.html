<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorrentFinder | محرك البحث المتطور</title>
    <!-- الأيقونة -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3290/3290074.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto pt-10">
        <!-- أيقونة الموقع في الصفحة الرئيسية -->
        <div class="text-center mb-8">
            <img src="https://cdn-icons-png.flaticon.com/512/3290/3290074.png" alt="icon" class="w-16 h-16 mx-auto mb-2">
            <h1 class="text-3xl font-bold">TorrentFinder</h1>
        </div>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="searchInput" placeholder="اكتب اسم الفيلم أو المسلسل بدقة..." class="flex-1 bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none focus:border-indigo-500">
            <button onclick="runSearch()" id="searchBtn" class="bg-indigo-600 px-8 rounded-xl font-bold hover:bg-indigo-500 transition">بحث</button>
        </div>

        <div id="status" class="text-center text-indigo-400 mb-4 hidden items-center justify-center gap-2">
            <div class="spinner"></div> <span>جاري البحث في المصادر العالمية...</span>
        </div>
        <div id="results" class="grid grid-cols-1 gap-4"></div>
    </div>

    <script>
        const engines = [
            { name: 'YTS', url: 'https://yts.mx/api/v2/list_movies.json?query_term=' },
            { name: '1337x', url: 'https://torrent-api-py.vercel.app/api/v1/1337x/' }
        ];

        async function runSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            const resDiv = document.getElementById('results');
            const statDiv = document.getElementById('status');
            const btn = document.getElementById('searchBtn');
            
            resDiv.innerHTML = '';
            statDiv.classList.remove('hidden');
            btn.disabled = true;

            let allResults = [];

            // البحث التوازي
            const promises = engines.map(async (engine) => {
                try {
                    const response = await fetch(engine.url + encodeURIComponent(q));
                    const data = await response.json();
                    return engine.name === 'YTS' ? (data.data.movies || []) : data;
                } catch (e) { return []; }
            });

            const resultsArrays = await Promise.all(promises);
            allResults = resultsArrays.flat();
            
            statDiv.classList.add('hidden');
            btn.disabled = false;

            if (allResults.length === 0) {
                resDiv.innerHTML = '<p class="text-center text-red-400">لم يتم العثور على نتائج. تأكد من كتابة الاسم بالإنجليزية.</p>';
                return;
            }

            // الفلترة الذكية: ترتيب النتائج حسب مدى قربها من كلمة البحث
            const sortedResults = allResults.sort((a, b) => {
                const titleA = (a.title || a.name).toLowerCase();
                const qLower = q.toLowerCase();
                return titleA.includes(qLower) ? -1 : 1;
            });

            sortedResults.slice(0, 15).forEach(item => {
                const title = item.title || item.name;
                const magnet = item.magnet || (item.torrents ? `magnet:?xt=urn:btih:${item.torrents[0].hash}` : '#');
                
                resDiv.innerHTML += `
                    <div class="glass p-4 rounded-xl flex justify-between items-center border border-slate-700 hover:border-indigo-500 transition">
                        <span class="truncate ml-4 text-sm">${title}</span>
                        <button onclick="navigator.clipboard.writeText('${magnet}'); alert('تم النسخ!');" 
                            class="bg-indigo-600 text-xs px-4 py-2 rounded-lg hover:bg-indigo-500">نسخ الرابط</button>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') runSearch(); });
    </script>
</body>
</html>
