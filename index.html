<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث التورنت المتقدم - AV1 & x265</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: { sans: ['Tajawal', 'sans-serif'] },
            colors: {
                primary: '#6366f1',
                secondary: '#8b5cf6',
                dark: '#0f172a',
                darker: '#020617',
                card: '#1e293b',
            }
        }
    }
}
</script>
<style>
body { font-family: 'Tajawal', sans-serif; background-color: #020617; }
.gradient-text { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
.torrent-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
.torrent-card:hover { transform: translateY(-4px); border-color: rgba(99, 102, 241, 0.4); box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.3); }
.codec-badge-av1 { background: linear-gradient(135deg, #10b981, #059669); }
.codec-badge-x265 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
.codec-badge-x264 { background: linear-gradient(135deg, #f59e0b, #d97706); }
.codec-badge-other { background: linear-gradient(135deg, #6b7280, #4b5563); }
.loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid #6366f1; width: 40px; height: 40px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.magnet-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.2s; }
.magnet-btn:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4); }
.quality-4k { color: #f87171; }
.quality-1080 { color: #60a5fa; }
.quality-720 { color: #34d399; }
.source-badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); }
.error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
.success-box { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
.info-box { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); }
.progress-bar { height: 6px; background: rgba(99,102,241,0.15); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.2s ease-out; }
</style>
</head>
<body class="text-gray-100 min-h-screen">

<header class="fixed top-0 w-full z-50 glass">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                <i class="fas fa-magnet text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold gradient-text">TorrentFinder</h1>
                <p class="text-xs text-gray-400">بحث متقدم بترتيب الجودة</p>
            </div>
        </div>
        <div class="hidden lg:flex items-center gap-3 text-xs text-gray-400">
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> YTS</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> TPB</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> EZTV</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> Nyaa</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> 1337x</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> TGx</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> Lime</span>
        </div>
    </div>
</header>

<main class="pt-28 pb-12 px-4 max-w-7xl mx-auto">
    <div class="text-center mb-10">
        <h2 class="text-3xl md:text-4xl font-bold mb-4">ابحث عن أفضل جودة فيديو</h2>
        <p class="text-gray-400 mb-8 max-w-2xl mx-auto">يتم ترتيب النتائج تلقائياً: AV1 أولاً، ثم x265/HEVC، ثم x264، ثم باقي الصيغ</p>

        <div class="max-w-3xl mx-auto relative">
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="اكتب اسم الفيلم أو المسلسل بدقة..." 
                    class="flex-1 bg-card border border-gray-700 rounded-xl px-6 py-4 text-lg outline-none text-white placeholder-gray-500 focus:border-primary focus:ring-2 focus:ring-primary/30 transition-all">
                <button onclick="searchTorrents()" id="searchBtn" class="magnet-btn px-8 py-4 rounded-xl font-bold text-white flex items-center gap-2 min-w-[100px] justify-center">
                    <i class="fas fa-search" id="searchIcon"></i>
                    <span class="hidden md:inline" id="searchText">بحث</span>
                </button>
            </div>

            <div class="flex flex-wrap justify-center gap-2 mt-4">
                <button onclick="setFilter('all')" class="filter-btn px-4 py-2 rounded-lg bg-primary/20 text-primary border border-primary/30 text-sm font-bold active" data-filter="all">الكل</button>
                <button onclick="setFilter('av1')" class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-gray-300 border border-gray-700 hover:border-green-500/50 hover:text-green-400 transition-all text-sm font-medium" data-filter="av1"><i class="fas fa-star mr-1"></i> AV1</button>
                <button onclick="setFilter('x265')" class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-gray-300 border border-gray-700 hover:border-blue-500/50 hover:text-blue-400 transition-all text-sm font-medium" data-filter="x265">x265 / HEVC</button>
                <button onclick="setFilter('x264')" class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-gray-300 border border-gray-700 hover:border-yellow-500/50 hover:text-yellow-400 transition-all text-sm font-medium" data-filter="x264">x264 / AVC</button>
            </div>
        </div>
    </div>

    <div id="progressArea" class="hidden max-w-3xl mx-auto mb-4">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span id="progressText">جاري البحث المتوازي السريع...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width: 0%"></div></div>
    </div>

    <div id="statusMsg" class="hidden max-w-3xl mx-auto mb-6 rounded-xl p-4 text-sm"></div>

    <div id="statsBar" class="hidden mb-6 glass rounded-xl p-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-6 text-sm flex-wrap">
            <span class="text-gray-400">النتائج: <span id="totalResults" class="text-white font-bold">0</span></span>
            <span class="text-gray-400">AV1: <span id="av1Count" class="text-green-400 font-bold">0</span></span>
            <span class="text-gray-400">x265: <span id="x265Count" class="text-blue-400 font-bold">0</span></span>
            <span class="text-gray-400">x264: <span id="x264Count" class="text-yellow-400 font-bold">0</span></span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-sm text-gray-400">الترتيب:</span>
            <select id="sortSelect" onchange="renderResults()" class="bg-card border border-gray-700 rounded-lg px-3 py-1 text-sm outline-none">
                <option value="codec">الكوديك (الجودة)</option>
                <option value="quality">الدقة</option>
                <option value="size">الحجم</option>
                <option value="seeds">الموزعين (Seeds)</option>
            </select>
        </div>
    </div>
