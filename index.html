<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TorrentFinder | محرك بحث متطور</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { font-family: 'Tajawal', sans-serif; background-color: #020617; color: white; }
.torrent-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
.torrent-card:hover { border-color: #6366f1; }
.loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen p-4">

<div class="max-w-4xl mx-auto pt-10">
    <h1 class="text-3xl font-bold text-center mb-6">محرك البحث المتقدم</h1>
    
    <div class="flex gap-2 mb-6">
        <input type="text" id="searchInput" placeholder="اكتب اسم العمل هنا..." class="flex-1 bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none">
        <button onclick="performSearch()" class="bg-indigo-600 px-8 rounded-xl font-bold hover:bg-indigo-500">بحث</button>
    </div>

    <div id="progress" class="hidden mb-6 text-center text-indigo-400">
        <div class="loader mx-auto mb-2"></div>
        <span id="progText">جاري الفحص...</span>
    </div>

    <div id="results" class="grid grid-cols-1 gap-4"></div>
</div>

<script>
// دالة الجلب الذكية بمصادر متعددة (Fallback Mechanism)
async function fetchWithFallback(urls) {
    for (let url of urls) {
        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 7000);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            if (response.ok) return await response.json();
        } catch (e) { continue; }
    }
    return null;
}

async function performSearch() {
    const q = document.getElementById('searchInput').value;
    if (!q) return;

    document.getElementById('results').innerHTML = '';
    document.getElementById('progress').classList.remove('hidden');
    document.getElementById('progText').textContent = 'جاري الاتصال بالمصادر...';

    // استخدام روابط API بديلة ومتعددة لكل موقع
    const apis = [
        `https://torrent-api-py.vercel.net/api/v1/all/${encodeURIComponent(q)}`,
        `https://yts.mx/api/v2/list_movies.json?query_term=${encodeURIComponent(q)}`
    ];

    try {
        const data = await fetchWithFallback(apis);
        document.getElementById('progress').classList.add('hidden');
        
        if (!data || (data.data && data.data.movie_count === 0)) {
            document.getElementById('results').innerHTML = '<p class="text-center text-red-400">لم يتم العثور على نتائج. حاول كتابة اسم الفيلم بالإنجليزية فقط.</p>';
            return;
        }

        // عرض النتائج (مثال بسيط لعرض البيانات)
        const items = data.data && data.data.movies ? data.data.movies : data;
        items.slice(0, 10).forEach(item => {
            const card = document.createElement('div');
            card.className = 'torrent-card p-4 rounded-xl flex justify-between items-center';
            card.innerHTML = `
                <div>
                    <h3 class="font-bold">${item.title || item.name}</h3>
                    <p class="text-xs text-slate-400">المصدر: ${item.source || 'Direct'}</p>
                </div>
                <button onclick="navigator.clipboard.writeText('${item.magnet || '#'}')" class="bg-indigo-500 px-4 py-2 rounded-lg text-sm">نسخ المغناطيس</button>
            `;
            document.getElementById('results').appendChild(card);
        });

    } catch (err) {
        document.getElementById('results').innerHTML = '<p class="text-center text-red-400">خطأ في الاتصال. حاول مرة أخرى.</p>';
    }
}
</script>
</body>
</html>
