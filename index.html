<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TorrentFinder | البحث المتقدم</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3290/3290074.png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: { sans: ['Tajawal', 'sans-serif'] },
            colors: { dark: '#0b0f19', card: '#131b2c', primary: '#6366f1' }
        }
    }
}
</script>
<style>
body { background-color: #0b0f19; color: #f8fafc; font-family: 'Tajawal', sans-serif; -webkit-font-smoothing: antialiased; }
.glass-header { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
.search-box { background: #131b2c; border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s ease; }
.search-box:focus-within { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
.torrent-card { background: #131b2c; border: 1px solid rgba(255,255,255,0.04); transition: transform 0.2s ease, border-color 0.2s ease; }
.torrent-card:hover { transform: translateY(-4px); border-color: rgba(99, 102, 241, 0.4); }
.badge-av1 { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
.badge-x265 { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
.badge-x264 { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
.skeleton { background: linear-gradient(90deg, #131b2c 25%, #1e293b 50%, #131b2c 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 1rem; }
@keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.loader-bar { height: 3px; background: linear-gradient(90deg, transparent, #6366f1, transparent); width: 100%; animation: slide 1.5s infinite; transform-origin: left; }
@keyframes slide { 0% { transform: scaleX(0); opacity: 0; } 50% { transform: scaleX(1); opacity: 1; } 100% { transform: scaleX(0); opacity: 0; transform-origin: right; } }
</style>
</head>
<body class="flex flex-col min-h-screen">

<header class="fixed top-0 w-full z-50 glass-header">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fas fa-layer-group text-white text-sm"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white leading-none">TorrentFinder</h1>
                <span class="text-[10px] text-slate-400 font-medium tracking-wide">PRO SEARCH</span>
            </div>
        </div>
        <div id="topLoader" class="hidden absolute bottom-0 left-0 w-full overflow-hidden"><div class="loader-bar"></div></div>
    </div>
</header>

<main class="flex-grow pt-32 pb-16 px-4 max-w-6xl mx-auto w-full">
    <div class="text-center mb-10">
        <h2 class="text-3xl md:text-4xl font-extrabold mb-3 text-white tracking-tight">ابحث في قواعد البيانات العالمية</h2>
        
        <div class="max-w-2xl mx-auto mt-8 relative">
            <div class="search-box rounded-2xl flex items-center pr-4 relative">
                <i class="fas fa-search text-slate-500"></i>
                <input type="text" id="searchInput" placeholder="أدخل اسم الفيلم أو المسلسل..." class="w-full bg-transparent border-none py-4 px-4 text-white outline-none placeholder-slate-600">
                <button onclick="triggerSearch()" id="searchBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-2.5 rounded-xl m-1.5 font-bold transition-colors text-sm flex items-center gap-2">
                    بحث
                </button>
            </div>
            
            <div class="flex justify-center gap-2 mt-4 text-xs font-medium">
                <button onclick="setFilter('all')" class="filter-btn text-indigo-400 bg-indigo-500/10 px-4 py-1.5 rounded-lg border border-indigo-500/20 transition-all active" data-filter="all">الكل</button>
                <button onclick="setFilter('av1')" class="filter-btn text-slate-400 hover:text-white px-4 py-1.5 rounded-lg border border-transparent transition-all" data-filter="av1">AV1</button>
                <button onclick="setFilter('x265')" class="filter-btn text-slate-400 hover:text-white px-4 py-1.5 rounded-lg border border-transparent transition-all" data-filter="x265">x265</button>
                <button onclick="setFilter('x264')" class="filter-btn text-slate-400 hover:text-white px-4 py-1.5 rounded-lg border border-transparent transition-all" data-filter="x264">x264</button>
            </div>
        </div>
    </div>

    <div id="alertBox" class="hidden max-w-2xl mx-auto mb-6 p-4 rounded-xl text-sm font-medium text-center border"></div>

    <div id="statsBar" class="hidden mb-6 flex flex-wrap items-center justify-between gap-4">
        <div class="flex gap-3 text-xs font-bold text-slate-400">
            <span class="bg-card px-3 py-1.5 rounded-lg border border-slate-800">نتائج: <span id="countTotal" class="text-white ml-1">0</span></span>
        </div>
        <select id="sortSelect" onchange="renderResults()" class="bg-card border border-slate-800 text-slate-300 text-xs rounded-lg px-3 py-1.5 outline-none cursor-pointer">
            <option value="relevance">الأكثر تطابقاً</option>
            <option value="codec">دقة الجودة (AV1 > x265)</option>
            <option value="seeds">المزودون (Seeders)</option>
            <option value="size">حجم الملف</option>
        </select>
    </div>

    <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>
</main>

<div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-700 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 z-50 transition-all duration-300 opacity-0 pointer-events-none translate-y-4 text-sm font-medium">
    <i class="fas fa-check-circle text-emerald-400 text-lg"></i> <span id="toastMsg">تم النسخ</span>
</div>

<script>
let allResults = [];
let currentFilter = 'all';
let currentQuery = '';

// منظومة الروابط
const PRIVATE_PROXY = 'https://my-cors-proxy.karimslimany.workers.dev/?url=';
const PUBLIC_PROXY = 'https://api.allorigins.win/raw?url=';

/**
 * دالة الجلب الذكية (السر الحقيقي للسرعة):
 * 1. تستخدم AbortController لقتل الطلبات المعلقة فوراً بعد 4 ثوانٍ.
 * 2. تحاول الاتصال المباشر أولاً (الأسرع)، ثم البروكسي الخاص، ثم البروكسي العام.
 */
async function fetchSmart(url, options = {}, isJson = true) {
    const timeoutMs = 4500; 

    // المحاولة 1: اتصال مباشر (للمواقع التي تدعم CORS)
    try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeoutMs);
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(id);
        if (res.ok) return isJson ? await res.json() : await res.text();
    } catch (e) {
        if (e.name === 'AbortError') throw new Error('Timeout Direct');
    }

    // المحاولة 2: البروكسي الخاص (Worker)
    try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeoutMs);
        const res = await fetch(PRIVATE_PROXY + encodeURIComponent(url), { ...options, signal: controller.signal });
        clearTimeout(id);
        if (res.ok) return isJson ? await res.json() : await res.text();
    } catch (e) {
        if (e.name === 'AbortError') throw new Error('Timeout Proxy');
    }

    // المحاولة 3: بروكسي عام احتياطي (لطلبات GET فقط)
    if (!options.method || options.method === 'GET') {
        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            const res = await fetch(PUBLIC_PROXY + encodeURIComponent(url), { signal: controller.signal });
            clearTimeout(id);
            if (res.ok) return isJson ? await res.json() : await res.text();
        } catch (e) {}
    }

    throw new Error('All fetch routes failed');
}

// ==========================================
// محركات البحث الموثوقة (تم تقليصها للأقوى فقط)
// ==========================================

async function engineTPB(q) {
    try {
        const data = await fetchSmart(`https://apibay.org/q.php?q=${encodeURIComponent(q)}&cat=200`);
        if (Array.isArray(data) && data[0].id !== '0') {
            return data.slice(0, 25).map(i => ({
                name: i.name, magnet: `magnet:?xt=urn:btih:${i.info_hash}&dn=${encodeURIComponent(i.name)}`,
                size: parseInt(i.size) || 0, seeds: parseInt(i.seeders) || 0, source: 'TPB'
            }));
        }
    } catch (e) {} return [];
}

async function engineYTS(q) {
    try {
        const data = await fetchSmart(`https://yts.mx/api/v2/list_movies.json?query_term=${encodeURIComponent(q)}&limit=15`);
        if (data?.data?.movies) {
            return data.data.movies.flatMap(m => (m.torrents || []).map(t => ({
                name: `${m.title} (${m.year}) [${t.quality}]`, magnet: `magnet:?xt=urn:btih:${t.hash}&dn=${encodeURIComponent(m.title)}`,
                size: t.size_bytes || 0, seeds: t.seeds || 0, source: 'YTS'
            })));
        }
    } catch (e) {} return [];
}

async function engineSolid(q) {
    try {
        const data = await fetchSmart(`https://solidtorrents.net/api/v1/search?q=${encodeURIComponent(q)}&category=all`);
        if (data?.results) {
            return data.results.map(i => ({
                name: i.title, magnet: i.magnet, size: parseInt(i.size) || 0, seeds: parseInt(i.seeds) || 0, source: 'Solid'
            }));
        }
    } catch (e) {} return [];
}

async function engineKnaben(q) {
    try {
        const body = JSON.stringify({ query: q, search_field: 'title', order_by: 'seeders', order_direction: 'desc', from: 0, size: 20 });
        const data = await fetchSmart('https://api.knaben.org/v1', { method: 'POST', headers:{'Content-Type':'application/json'}, body: body });
        if (data?.hits) {
            return data.hits.map(i => ({
                name: i.title, magnet: i.magnetUrl || i.link, size: parseInt(i.bytes) || 0, seeds: parseInt(i.seeders) || 0, source: 'Knaben'
            }));
        }
    } catch (e) {} return [];
}

// ==========================================
// منطق معالجة الواجهة والفرز
// ==========================================

function showAlert(msg, type = 'error') {
    const el = document.getElementById('alertBox');
    el.className = `max-w-2xl mx-auto mb-6 p-3 rounded-xl text-sm font-medium text-center border ${type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-400' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400'}`;
    el.innerHTML = msg; el.classList.remove('hidden');
}

function showSkeletons() {
    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = Array(6).fill(`<div class="skeleton h-36 w-full"></div>`).join('');
}

async function triggerSearch() {
    const rawQuery = document.getElementById('searchInput').value;
    const q = rawQuery.replace(/[^\w\s\u0600-\u06FF-]/g, ' ').trim();
    if (!q || q.length < 2) return;

    currentQuery = q;
    allResults = [];
    document.getElementById('alertBox').classList.add('hidden');
    document.getElementById('statsBar').classList.add('hidden');
    document.getElementById('topLoader').classList.remove('hidden');
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('searchBtn').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
    
    showSkeletons();

    const engines = [engineTPB, engineYTS, engineSolid, engineKnaben];
    let isFirstResultRendered = false;

    // تشغيل المحركات بالتوازي، وتحديث الواجهة فور عودة أي محرك (التدفق المباشر)
    const promises = engines.map(async (engineFunc) => {
        const res = await engineFunc(q);
        const valid = res.filter(r => r.magnet && r.magnet.startsWith('magnet:'));
        
        if (valid.length > 0) {
            // تنظيف النتائج المكررة بناءً على الـ Hash
            const existingHashes = new Set(allResults.map(i => extractHash(i.magnet)));
            const newUnique = valid.filter(i => {
                const h = extractHash(i.magnet);
                if (h && !existingHashes.has(h)) { existingHashes.add(h); return true; }
                return false;
            });

            if (newUnique.length > 0) {
                allResults = [...allResults, ...newUnique];
                document.getElementById('statsBar').classList.remove('hidden');
                document.getElementById('countTotal').textContent = allResults.length;
                renderResults(); // إعادة الرسم الفوري
            }
        }
    });

    await Promise.all(promises);

    document.getElementById('topLoader').classList.add('hidden');
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('searchBtn').innerHTML = 'بحث';

    if (allResults.length === 0) {
        document.getElementById('resultsGrid').innerHTML = '';
        showAlert('<i class="fas fa-search-minus mr-2"></i> لم يتم العثور على نتائج. جرب كلمات مفتاحية أبسط.');
    }
}

function extractHash(magnet) {
    const match = magnet.match(/urn:btih:([a-zA-Z0-9]+)/);
    return match ? match[1].toLowerCase() : null;
}

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.filter === filter) btn.className = "filter-btn text-indigo-400 bg-indigo-500/10 px-4 py-1.5 rounded-lg border border-indigo-500/20 transition-all active";
        else btn.className = "filter-btn text-slate-400 hover:text-white px-4 py-1.5 rounded-lg border border-transparent transition-all";
    });
    renderResults();
}

function detectSpecs(name) {
    const n = name.toLowerCase();
    let codec = { name: 'Other', class: 'border-slate-700 text-slate-500', val: 4 };
    if (n.includes('av1')) codec = { name: 'AV1', class: 'badge-av1', val: 1 };
    else if (n.includes('x265') || n.includes('hevc')) codec = { name: 'x265', class: 'badge-x265', val: 2 };
    else if (n.includes('x264') || n.includes('avc')) codec = { name: 'x264', class: 'badge-x264', val: 3 };
    
    let res = 'SD'; let resVal = 4;
    if (n.includes('2160') || n.includes('4k')) { res = '4K'; resVal = 1; }
    else if (n.includes('1080')) { res = '1080p'; resVal = 2; }
    else if (n.includes('720')) { res = '720p'; resVal = 3; }

    return { codec, res, resVal };
}

function formatBytes(bytes) {
    if (!bytes) return '--';
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + ['B', 'KB', 'MB', 'GB', 'TB'][i];
}

function renderResults() {
    const grid = document.getElementById('resultsGrid');
    if (allResults.length === 0) return;

    const sortVal = document.getElementById('sortSelect').value;
    
    let filtered = allResults;
    if (currentFilter !== 'all') {
        filtered = allResults.filter(r => detectSpecs(r.name).codec.name.toLowerCase().includes(currentFilter.replace('x','')));
    }

    filtered.sort((a, b) => {
        const specA = detectSpecs(a.name); const specB = detectSpecs(b.name);
        if (sortVal === 'codec') return specA.codec.val - specB.codec.val || specA.resVal - specB.resVal || b.seeds - a.seeds;
        if (sortVal === 'size') return b.size - a.size;
        if (sortVal === 'seeds') return b.seeds - a.seeds;
        // Relevance
        const aMatch = a.name.toLowerCase().includes(currentQuery.toLowerCase()) ? 1 : 0;
        const bMatch = b.name.toLowerCase().includes(currentQuery.toLowerCase()) ? 1 : 0;
        return bMatch - aMatch || b.seeds - a.seeds;
    });

    grid.innerHTML = filtered.map(item => {
        const specs = detectSpecs(item.name);
        return `
        <div class="torrent-card rounded-2xl p-4 flex flex-col justify-between h-full relative overflow-hidden">
            <div>
                <div class="flex justify-between items-start mb-3">
                    <div class="flex gap-2">
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${specs.codec.class}">${specs.codec.name}</span>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-card border border-slate-700 text-slate-300">${specs.res}</span>
                    </div>
                    <span class="text-[9px] text-slate-500 uppercase tracking-wider">${item.source}</span>
                </div>
                <h3 class="text-sm font-bold text-slate-200 leading-snug mb-3 line-clamp-2" dir="ltr" title="${item.name.replace(/"/g, '&quot;')}">${item.name}</h3>
            </div>
            
            <div>
                <div class="flex justify-between items-center text-xs font-medium text-slate-400 mb-4 bg-slate-900/50 p-2 rounded-lg">
                    <span dir="ltr"><i class="fas fa-hdd opacity-50 mr-1"></i> ${formatBytes(item.size)}</span>
                    <span class="text-emerald-400"><i class="fas fa-arrow-up opacity-50 mr-1"></i> ${item.seeds}</span>
                </div>
                <div class="flex gap-2">
                    <a href="${item.magnet}" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-2 rounded-lg flex items-center justify-center transition-colors">
                        فتح المغناطيس
                    </a>
                    <button onclick="copyToClip('${item.magnet}', this)" class="w-10 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg flex items-center justify-center transition-colors border border-slate-700">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function copyToClip(text, btn) {
    navigator.clipboard.writeText(text);
    const toast = document.getElementById('toast');
    toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
    
    const icon = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check text-emerald-400"></i>';
    
    setTimeout(() => { 
        toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'); 
        btn.innerHTML = icon;
    }, 2000);
}

document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') triggerSearch(); });
</script>
</body>
</html>
